<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Closed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        .message {
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .details {
            font-size: 1em;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        
        .contact {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 30px;
        }
        
        .contact a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .contact a:hover {
            border-bottom: 1px solid rgba(255, 255, 255, 1);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .icon {
            animation: pulse 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>System Closed</h1>
        <div class="message">
            We're currently performing scheduled maintenance to improve your experience.
        </div>
        <div class="details">
            Expected downtime: 2-4 hours<br>
            Started: Today at 2:00 AM EST
        </div>
        <div class="contact">
            For urgent matters, please contact us at<br>
            <a href="mailto:support@yoursite.com">support@yoursite.com</a>
        </div>
    </div>
</body>
</html>
